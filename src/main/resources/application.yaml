spring:
  application:
    name: virtusa

  datasource:
    url: jdbc:postgresql://localhost:5432/database_name
    username: username
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: port_number

logging:
  level:
    com.virtusa.poc: DEBUG
    org.springframework.web: INFO
